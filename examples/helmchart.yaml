#
# Example: install a chart from a git repo via helm-proxy on k3s.
#
# This points at the public ryzenpay/helm-proxy repo and installs its `test`
# chart (charts/test), which just prints "Success" on install.
#
# https://docs.k3s.io/add-ons/helm
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: helm-proxy-test
spec:
  targetNamespace: helm-proxy
  # helm-proxy endpoint. Pattern: /git/<git-host>/<org>/<repo>@<ref>
  # replace with ingress url if external
  repo: http://helm-proxy.helm-proxy.svc.cluster.local:7713/git/github.com/ryzenpay/helm-proxy@main
  # Chart name as it appears in the repo's Chart.yaml (name field).
  chart: test
  # Omit `version` to install the latest version in the repo index.
  # To pin one instead, uncomment:
  # version: 0.1.0

# --- For a PRIVATE git repo, add a basic-auth Secret and reference it below ---
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: git-basic-auth
# type: kubernetes.io/basic-auth
# stringData:
#   # For GitHub, use a Personal Access Token as the password (any username works).
#   username: helm-proxy
#   password: <token-here>
#
# then add to the HelmChart spec above:
#   authSecret:
#     name: git-basic-auth
