# Example: install a chart from a git repo via helm-proxy on k3s.
#
# The `repo` points at helm-proxy, which clones the git repo, packages the chart,
# and serves index.yaml + .tgz. The `authSecret` (basic-auth) is forwarded by the
# HelmChart controller to helm-proxy, which passes it through to git — so a PRIVATE
# git repo works with no credentials stored on the proxy.
---
apiVersion: v1
kind: Secret
metadata:
  name: git-basic-auth
  namespace: kube-system
type: kubernetes.io/basic-auth
stringData:
  # For GitHub, use a Personal Access Token as the password (any username works;
  # 'x-access-token' is conventional).
  username: x-access-token
  password: ghp_replace_with_your_token
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: my-app
  namespace: kube-system
spec:
  # helm-proxy endpoint. Pattern: /git/<git-host>/<org>/<repo>@<ref>
  repo: https://helm-proxy.example.com/git/github.com/myorg/private-charts@main
  # Chart name as it appears in the repo's Chart.yaml (name field).
  chart: my-app
  version: 1.2.3
  # Pass the git credentials through helm-proxy to the private git repo.
  authSecret:
    name: git-basic-auth
  # Values for the chart being installed.
  valuesContent: |-
    replicaCount: 2
