replicaCount: 1

image:
  repository: ghcr.io/ryzenpay/helm-proxy
  tag: ""            # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# --- Application configuration (maps to env vars) ---
config:
  cacheTtl: 300
  cacheDir: /var/cache/helm-proxy
  defaultRef: main
  # Public URL of the proxy. Leave empty to derive from the incoming request
  # (honoring X-Forwarded-* from the ingress).
  externalBaseUrl: ""
  logLevel: info
  # Allowlist of git hosts / host-org prefixes. put * to allow all
  allowedHosts:
    - github.com
    - gitlab.com

# Per-host git credentials, rendered into a Secret and mounted as
# GIT_CREDENTIALS. Used when the client sends no basic-auth.
# Example:
#   gitCredentials:
#     "github.com/myorg":
#       username: x-access-token
#       token: ghp_xxx
gitCredentials: {}

# If set, POST /refresh requires this bearer token (stored in the Secret).
refreshToken: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 7713
  targetPort: 7713

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: helm-proxy.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Cache storage. Default is an emptyDir (rebuilt on restart). Enable persistence
# to keep clones/packaged charts across restarts.
persistence:
  enabled: false
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 5Gi

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
